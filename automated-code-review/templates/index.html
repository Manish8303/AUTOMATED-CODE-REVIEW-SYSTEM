<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Automated Code Review</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #2563eb, #9333ea);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.15);
    }

    textarea, input[type="text"], input[type="file"] {
      transition: all 0.25s ease-in-out;
    }

    textarea:focus, input:focus {
      border-color: #9333ea !important;
      box-shadow: 0 0 0 4px rgba(147, 51, 234, 0.2);
    }
  </style>
</head>
<body>
  <div class="max-w-3xl w-full glass-card rounded-2xl p-6 sm:p-10">
    <!-- Header -->
    <div class="text-center mb-10">
      <h1 class="text-4xl sm:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 mb-3">
        🚀 Automated Code Review
      </h1>
      <p class="text-gray-600 text-lg max-w-2xl mx-auto leading-relaxed">
        Paste your Python or C/C++ code below, give it a filename, or upload from GitHub/ZIP to review instantly.
      </p>
    </div>

    <!-- Form -->
    <form method="post" enctype="multipart/form-data" autocomplete="off" class="space-y-7">
      <!-- Filename -->
      <div>
        <label for="filename" class="block text-base font-semibold text-gray-800 mb-2">Filename (with extension)</label>
        <input type="text" id="filename" name="filename" placeholder="example.py"
          value="{{ filename|default('') }}"
          class="w-full rounded-xl border-gray-300 text-gray-700 text-base py-2 shadow-sm focus:border-purple-500 focus:ring-purple-500"/>
      </div>

      <!-- Code -->
      <div>
        <label for="code" class="block text-base font-semibold text-gray-800 mb-2">Paste your code</label>
        <textarea id="code" name="code" placeholder="Paste your code here..."
          class="w-full h-64 bg-gray-50 text-gray-800 border border-gray-300 rounded-xl shadow-inner focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all duration-300 text-base p-3">{{ code|default('') }}</textarea>
      </div>

      <!-- Upload Files -->
      <div>
        <label for="files" class="block text-base font-semibold text-gray-800 mb-2">Upload files (multiple or zip)</label>
        <input type="file" id="files" name="files" multiple
          class="w-full text-base text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg 
                 file:border-0 file:text-sm file:font-semibold 
                 file:bg-violet-50 file:text-violet-700 hover:file:bg-violet-100"/>
      </div>

      <!-- Repo URL -->
      <div>
        <label for="repo_url" class="block text-base font-semibold text-gray-800 mb-2">Or enter GitHub repo URL</label>
        <input type="text" id="repo_url" name="repo_url" placeholder="https://github.com/user/repo"
          class="w-full rounded-xl border-gray-300 text-gray-700 text-base py-2 shadow-sm focus:border-purple-500 focus:ring-purple-500"/>
      </div>

      <!-- Submit -->
      <div class="flex items-center justify-center pt-4">
        <button type="submit"
          class="px-10 py-3 bg-gradient-to-r from-blue-500 to-purple-600 text-white rounded-full font-bold shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-300 ease-in-out text-lg">
          <i class="fas fa-magic mr-2"></i> Review Code
        </button>
      </div>
    </form>

    <!-- CLI Tip -->
    <div class="mt-10 bg-gray-50 p-5 rounded-xl text-gray-700 text-base shadow-inner border border-gray-100">
      <b class="text-gray-900">💡 Tip:</b> You can also upload a file using the CLI:<br>
      <code class="font-mono text-purple-600 text-sm">python review.py path/to/file_or_dir</code>
    </div>
  </div>

  <script>
    document.getElementById('files').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('filename').value = file.name;
        const reader = new FileReader();
        reader.onload = (event) => {
          document.getElementById('code').value = event.target.result;
        };
        reader.readAsText(file);
      }
    });
  </script>
</body>
</html>
